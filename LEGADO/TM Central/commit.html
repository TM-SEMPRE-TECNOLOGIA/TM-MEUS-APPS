<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Central | Histórico de Commits</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --bg-card: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            --border-glass: rgba(148, 163, 184, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-emerald: #10b981;
            --accent-orange: #f97316;
            --accent-rose: #f43f5e;
            --glow-blue: rgba(59, 130, 246, 0.3);
            --glow-purple: rgba(139, 92, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, var(--glow-blue) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, var(--glow-purple) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 0.8;
            }
        }

        .header {
            padding: 1.5rem 3rem;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent-cyan);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 3rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }

        .add-commit-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .add-commit-section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .commit-form {
            display: grid;
            gap: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px var(--glow-blue);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
        }

        .btn-secondary:hover {
            background: rgba(30, 41, 59, 1);
            color: var(--text-primary);
        }

        .btn-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .timeline-section {
            margin-top: 2rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-purple), var(--accent-blue));
            border-radius: 2px;
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple), transparent);
        }

        .commit-entry {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .commit-entry:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .commit-entry::before {
            content: '';
            position: absolute;
            left: -28px;
            top: 1.5rem;
            width: 12px;
            height: 12px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 0 4px var(--bg-primary), 0 0 12px var(--glow-blue);
        }

        .commit-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .commit-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .commit-type {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-feature {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .type-fix {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .type-refactor {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .type-docs {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .type-style {
            background: rgba(236, 72, 153, 0.2);
            color: #ec4899;
        }

        .type-chore {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }

        .commit-system {
            font-size: 0.75rem;
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .commit-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .commit-message {
            font-size: 0.9375rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .commit-description {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .commit-files {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-glass);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .commit-files code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            color: var(--accent-cyan);
            margin-right: 0.5rem;
        }

        .delete-btn {
            padding: 0.375rem 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            color: var(--accent-rose);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .main-content {
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .timeline {
                padding-left: 1.5rem;
            }
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--text-primary);
            font-size: 0.8125rem;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .export-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-export {
            padding: 0.5rem 1rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .btn-export:hover {
            background: var(--accent-blue);
            color: white;
            border-color: transparent;
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>

    <header class="header">
        <div class="header-content">
            <a href="Readme.html" class="back-link">← Voltar ao Hub</a>
            <div class="logo">
                <div class="logo-icon">📝</div>
                <h1>Histórico de Commits</h1>
            </div>
            <div class="export-actions">
                <button class="btn-export" onclick="exportMarkdown()">📄 Exportar MD</button>
                <button class="btn-export" onclick="exportJSON()">📦 Exportar JSON</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="value" id="totalCommits">0</div>
                <div class="label">Total Commits</div>
            </div>
            <div class="stat-card">
                <div class="value" id="featuresCount">0</div>
                <div class="label">Features</div>
            </div>
            <div class="stat-card">
                <div class="value" id="fixesCount">0</div>
                <div class="label">Fixes</div>
            </div>
            <div class="stat-card">
                <div class="value" id="thisMonth">0</div>
                <div class="label">Este Mês</div>
            </div>
        </div>

        <div class="add-commit-section">
            <h2>➕ Registrar Novo Commit</h2>
            <form class="commit-form" id="commitForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Mensagem do Commit *</label>
                        <input type="text" id="commitMessage"
                            placeholder="Ex: Adiciona validação de campos no formulário" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="commitType">
                            <option value="feature">✨ Feature</option>
                            <option value="fix">🐛 Fix</option>
                            <option value="refactor">♻️ Refactor</option>
                            <option value="docs">📚 Docs</option>
                            <option value="style">💅 Style</option>
                            <option value="chore">🔧 Chore</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Descrição (opcional)</label>
                        <textarea id="commitDescription"
                            placeholder="Detalhes adicionais sobre as alterações..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Sistema Afetado</label>
                        <select id="commitSystem">
                            <option value="TM Pastas">TM Pastas</option>
                            <option value="TM Demandas">TM Demandas</option>
                            <option value="TM Extrator">TM Extrator</option>
                            <option value="TM Comparador">TM Comparador</option>
                            <option value="TM Relatorio">TM Relatório</option>
                            <option value="Legacy TM Relatorio">Legacy TM Relatório</option>
                            <option value="TM Central">TM Central</option>
                            <option value="global">🌐 Global</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Arquivos Modificados (separados por vírgula)</label>
                    <input type="text" id="commitFiles" placeholder="Ex: app.py, utils.py, README.md">
                </div>
                <div class="btn-actions">
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpar</button>
                    <button type="submit" class="btn btn-primary">💾 Salvar Commit</button>
                </div>
            </form>
        </div>

        <div class="timeline-section">
            <div class="section-title">Histórico de Alterações</div>

            <div class="filters">
                <select class="filter-select" id="filterType" onchange="renderCommits()">
                    <option value="all">Todos os tipos</option>
                    <option value="feature">Features</option>
                    <option value="fix">Fixes</option>
                    <option value="refactor">Refactors</option>
                    <option value="docs">Docs</option>
                    <option value="style">Styles</option>
                    <option value="chore">Chores</option>
                </select>
                <select class="filter-select" id="filterSystem" onchange="renderCommits()">
                    <option value="all">Todos os sistemas</option>
                    <option value="TM Pastas">TM Pastas</option>
                    <option value="TM Demandas">TM Demandas</option>
                    <option value="TM Extrator">TM Extrator</option>
                    <option value="TM Comparador">TM Comparador</option>
                    <option value="TM Relatorio">TM Relatório</option>
                    <option value="Legacy TM Relatorio">Legacy TM Relatório</option>
                    <option value="TM Central">TM Central</option>
                    <option value="global">Global</option>
                </select>
            </div>

            <div class="timeline" id="timeline">
                <!-- Commits will be rendered here -->
            </div>
        </div>
    </main>

    <script>
        // Initialize commits
        // Initial base commits (System Updates)
        const baseCommits = [
            {
                id: 10,
                date: '2026-02-11T01:45:00.000Z',
                type: 'refactor',
                system: 'TM Pastas',
                message: 'Refactor: Botão Excluir -> Limpar Seleção',
                description: 'Alterada a funcionalidade do botão de rodapé. Agora ele apenas limpa a seleção atual da interface (UI Reset) em vez de apagar a pasta física, atendendo solicitação de segurança do usuário.',
                files: ['app.py']
            },
            {
                id: 9,
                date: '2026-02-11T01:35:00.000Z',
                type: 'fix',
                system: 'TM Pastas',
                message: 'HOTFIX: Correção de Crash no Nível 4',
                description: 'Corrigido erro AttributeError ao selecionar sub-itens ou criar itens personalizados. Método _atualizar_ui_nivel4 estava faltando na classe principal.',
                files: ['app.py']
            },
            {
                id: 8,
                date: '2026-02-11T01:25:00.000Z',
                type: 'feature',
                system: 'TM Pastas',
                message: 'CRM-05/06: Suporte a Pastas Nível 4 e Validações',
                description: 'Adicionado painel de "Detalhes" (Nível 4) para permitir sub-itens em serviços. Implementado aviso inteligente ao tentar adicionar serviços diretamente na raiz de Áreas Internas.',
                files: ['app.py']
            },
            {
                id: 7,
                date: '2026-02-11T01:15:00.000Z',
                type: 'feature',
                system: 'TM Pastas',
                message: 'CRM-04: Botão de exclusão de estrutura',
                description: 'Implementado botão "EXCLUIR ESTRUTURA" que permite limpar a pasta gerada com um clique, após confirmação de segurança. Ideal para refazer testes rapidamente.',
                files: ['app.py']
            },
            {
                id: 6,
                date: '2026-02-11T01:05:00.000Z',
                type: 'fix',
                system: 'TM Pastas',
                message: 'CRM-03: Correção do bug de seleção múltipla (Guard Clause)',
                description: 'Adicionada flag self.updating_ui com try/finally nos métodos _atualizar_ui_itens e _atualizar_ui_sub. Métodos _toggle_item e _toggle_sub agora verificam a flag antes de processar.',
                files: ['app.py']
            },
            {
                id: 5,
                date: new Date().toISOString(),
                type: 'feature',
                system: 'TM Central',
                message: 'Expansão do Hub: Roadmap, Padrões e Equipe',
                description: 'Implementação de módulos essenciais: Roadmap (Kanban), Padrões (Design System), Equipe (AI Manifesto) e Workflow de IA.',
                files: ['roadmap.html', 'padroes.html', 'equipe.html', 'AI_WORKFLOW.md', 'Readme.html']
            },
            {
                id: 4,
                date: new Date().toISOString(),
                type: 'docs',
                system: 'TM Central',
                message: 'Atualização da documentação (TM Pastas)',
                description: 'Reflexo das novas funcionalidades do TM Pastas (hierarquia e itens personalizados) no Readme, Fluxo e Histórico.',
                files: ['Readme.html', 'fluxo.html', 'commit.html']
            },
            {
                id: 3,
                date: new Date().toISOString(),
                type: 'feature',
                system: 'TM Pastas',
                message: 'Hierarquia de Serviços e Itens Personalizados',
                description: 'Implementação de serviços como filhos de ambientes (1.1), novas abas de seleção e suporte a criação de nomes personalizados.',
                files: ['app.py']
            },
            {
                id: 2,
                date: '2026-02-10T14:30:00.000Z',
                type: 'refactor',
                system: 'global',
                message: 'Renomeação de todas as pastas do repositório',
                description: 'Padronização de nomes: TM Pastas, TM Demandas, TM Extrator, TM Comparador, TM Relatório, Legacy TM Relatório, TM Central.',
                files: ['TM Pastas', 'TM Demandas', 'TM Comparador', 'TM Relatorio', 'Legacy TM Relatorio', 'TM Central', 'Readme.html', 'commit.html']
            },
            {
                id: 1,
                date: '2026-02-06T08:06:12.000Z',
                type: 'feature',
                system: 'TM Central',
                message: 'Criação do Hub de Sistemas interativo',
                description: 'Implementação inicial do Readme.html com design moderno, cards para cada sistema, filtros por categoria e navegação.',
                files: ['Readme.html', 'commit.html']
            }
        ];

        // Load stored commits or empty array
        let storedCommits = JSON.parse(localStorage.getItem('tm-commits')) || [];

        // Merge strategy: Ensure baseCommits exist in storedCommits
        baseCommits.forEach(base => {
            if (!storedCommits.some(stored => stored.id === base.id)) {
                storedCommits.push(base);
            }
        });

        // Initialize main variable
        let commits = storedCommits;

        // Save back immediately to ensure user gets the update
        localStorage.setItem('tm-commits', JSON.stringify(commits));

        function saveCommits() {
            localStorage.setItem('tm-commits', JSON.stringify(commits));
        }

        function getTypeLabel(type) {
            const labels = {
                'feature': '✨ Feature',
                'fix': '🐛 Fix',
                'refactor': '♻️ Refactor',
                'docs': '📚 Docs',
                'style': '💅 Style',
                'chore': '🔧 Chore'
            };
            return labels[type] || type;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderCommits() {
            const timeline = document.getElementById('timeline');
            const filterType = document.getElementById('filterType').value;
            const filterSystem = document.getElementById('filterSystem').value;

            let filtered = commits.filter(c => {
                if (filterType !== 'all' && c.type !== filterType) return false;
                if (filterSystem !== 'all' && c.system !== filterSystem) return false;
                return true;
            });

            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Nenhum commit encontrado</h3>
                        <p>Adicione seu primeiro commit acima!</p>
                    </div>
                `;
            } else {
                timeline.innerHTML = filtered.map(commit => `
                    <div class="commit-entry" data-id="${commit.id}">
                        <div class="commit-header">
                            <div class="commit-meta">
                                <span class="commit-type type-${commit.type}">${getTypeLabel(commit.type)}</span>
                                <span class="commit-system">${commit.system}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <span class="commit-date">${formatDate(commit.date)}</span>
                                <button class="delete-btn" onclick="deleteCommit(${commit.id})">🗑️</button>
                            </div>
                        </div>
                        <p class="commit-message">${commit.message}</p>
                        ${commit.description ? `<p class="commit-description">${commit.description}</p>` : ''}
                        ${commit.files && commit.files.length > 0 ? `
                            <div class="commit-files">
                                📁 Arquivos: ${commit.files.map(f => `<code>${f}</code>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }

            updateStats();
        }

        function updateStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            document.getElementById('totalCommits').textContent = commits.length;
            document.getElementById('featuresCount').textContent = commits.filter(c => c.type === 'feature').length;
            document.getElementById('fixesCount').textContent = commits.filter(c => c.type === 'fix').length;
            document.getElementById('thisMonth').textContent = commits.filter(c => {
                const d = new Date(c.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            }).length;
        }

        function addCommit(commit) {
            commits.push({
                ...commit,
                id: Date.now(),
                date: new Date().toISOString()
            });
            saveCommits();
            renderCommits();
        }

        function deleteCommit(id) {
            if (confirm('Tem certeza que deseja excluir este commit?')) {
                commits = commits.filter(c => c.id !== id);
                saveCommits();
                renderCommits();
            }
        }

        function clearForm() {
            document.getElementById('commitForm').reset();
        }

        document.getElementById('commitForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const message = document.getElementById('commitMessage').value.trim();
            const type = document.getElementById('commitType').value;
            const system = document.getElementById('commitSystem').value;
            const description = document.getElementById('commitDescription').value.trim();
            const filesStr = document.getElementById('commitFiles').value.trim();
            const files = filesStr ? filesStr.split(',').map(f => f.trim()).filter(f => f) : [];

            if (!message) {
                alert('Por favor, informe a mensagem do commit.');
                return;
            }

            addCommit({ type, system, message, description, files });
            clearForm();

            const btn = document.querySelector('#commitForm .btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Salvo!';
            btn.style.background = 'var(--accent-emerald)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 2000);
        });

        function exportMarkdown() {
            let md = '# Histórico de Commits - TM Central\n\n';
            md += `Gerado em: ${new Date().toLocaleString('pt-BR')}\n\n`;
            md += '---\n\n';

            commits.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(c => {
                md += `## ${c.message}\n\n`;
                md += `- **Tipo:** ${getTypeLabel(c.type)}\n`;
                md += `- **Sistema:** ${c.system}\n`;
                md += `- **Data:** ${formatDate(c.date)}\n`;
                if (c.description) md += `- **Descrição:** ${c.description}\n`;
                if (c.files && c.files.length > 0) md += `- **Arquivos:** ${c.files.join(', ')}\n`;
                md += '\n---\n\n';
            });

            downloadFile('commits.md', md, 'text/markdown');
        }

        function exportJSON() {
            downloadFile('commits.json', JSON.stringify(commits, null, 2), 'application/json');
        }

        function downloadFile(filename, content, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initial render and save to localStorage
        saveCommits();
        renderCommits();
    </script>
</body>

</html>
